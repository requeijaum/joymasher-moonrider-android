<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>Vengeful Guardian Moonrider</title>

    <link rel="manifest" href="appmanifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, minimal-ui" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="HandheldFriendly" content="true" />
    <link rel="apple-touch-icon" sizes="256x256" href="icon-256.png" />
    <link rel="shortcut icon" sizes="256x256" href="icon-256.png" />

    <style type="text/css">
        * { padding: 0; margin: 0; box-sizing: border-box; }
        html, body {
            background: #000; color: #fff; width: 100%; height: 100%;
            overflow: hidden; touch-action: none; -ms-touch-action: none;
            -webkit-user-select: none; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        canvas { touch-action: none; -ms-touch-action: none; display: block; }

        /* ---- On-screen touch controls (hidden when a gamepad is present) ---- */
        #touch-controls {
            position: fixed; inset: 0; z-index: 9999; pointer-events: none;
            display: none; font-family: sans-serif;
        }
        #touch-controls.visible { display: block; }
        .tc-btn {
            position: absolute; pointer-events: auto;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: bold; font-size: 18px;
            background: rgba(255,255,255,0.10);
            border: 2px solid rgba(255,255,255,0.35);
            border-radius: 50%;
            -webkit-user-select: none; user-select: none;
            transition: background 0.05s;
        }
        .tc-btn.pressed { background: rgba(255,255,255,0.40); }
        .tc-round { width: 62px; height: 62px; }
        .tc-dpad  { width: 58px; height: 58px; border-radius: 12px; font-size: 22px; }
        .tc-small { width: 44px; height: 26px; border-radius: 13px; font-size: 12px; }
        .tc-shoulder { width: 76px; height: 40px; border-radius: 10px; font-size: 14px; }

        /* Shoulder triggers on the upper side edges */
        #tc-l1 { left: 14px;  top: 12px; }
        #tc-l2 { left: 14px;  top: 60px; }
        #tc-r1 { right: 14px; top: 12px; }
        #tc-r2 { right: 14px; top: 60px; }

        /* D-pad bottom-left */
        #tc-up    { left: 74px;  bottom: 156px; }
        #tc-down  { left: 74px;  bottom: 34px;  }
        #tc-left  { left: 14px;  bottom: 95px;  }
        #tc-right { left: 134px; bottom: 95px;  }
        /* Action buttons bottom-right (SNES-like diamond) */
        #tc-y { right: 134px; bottom: 100px; }   /* attack/shoot  -> C(67) */
        #tc-x { right: 74px;  bottom: 160px; }   /* special       -> S(83) */
        #tc-b { right: 74px;  bottom: 40px;  }   /* jump/back     -> X(88) */
        #tc-a { right: 14px;  bottom: 100px; }   /* jump/confirm  -> Z(90) */
        /* Start / Select bottom-center (top edges now hold the shoulders) */
        #tc-start  { left: 50%; bottom: 14px; transform: translateX(6px);  }
        #tc-select { left: 50%; bottom: 14px; transform: translateX(-56px); }
    </style>
</head>
<body>
    <div id="fb-root"></div>

    <div id="c2canvasdiv">
        <canvas id="c2canvas" width="428" height="240">
            <h1>Your browser does not appear to support HTML5.</h1>
        </canvas>
    </div>

    <!-- On-screen touch gamepad: dispatches the game's native keyboard codes -->
    <div id="touch-controls">
        <div class="tc-btn tc-dpad"  id="tc-up">&#9650;</div>
        <div class="tc-btn tc-dpad"  id="tc-down">&#9660;</div>
        <div class="tc-btn tc-dpad"  id="tc-left">&#9668;</div>
        <div class="tc-btn tc-dpad"  id="tc-right">&#9658;</div>
        <div class="tc-btn tc-round" id="tc-y">Y</div>
        <div class="tc-btn tc-round" id="tc-x">X</div>
        <div class="tc-btn tc-round" id="tc-b">B</div>
        <div class="tc-btn tc-round" id="tc-a">A</div>
        <div class="tc-btn tc-shoulder" id="tc-l1">L1</div>
        <div class="tc-btn tc-shoulder" id="tc-l2">L2</div>
        <div class="tc-btn tc-shoulder" id="tc-r1">R1</div>
        <div class="tc-btn tc-shoulder" id="tc-r2">R2</div>
        <div class="tc-btn tc-small" id="tc-start">START</div>
        <div class="tc-btn tc-small" id="tc-select">SEL</div>
    </div>

    <script src="jquery-3.4.1.min.js"></script>
    <script src="settings.js"></script>
    <script src="touch-controls.js"></script>
    <script src="c2runtime.js"></script>
    <script src="options-menu.js"></script>

    <script>
        jQuery(document).ready(function () {
            cr_createRuntime("c2canvas");
        });

        function onVisibilityChanged() {
            if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
                cr_setSuspended(true);
            else
                cr_setSuspended(false);
        }
        document.addEventListener("visibilitychange", onVisibilityChanged, false);
        document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
        document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
        document.addEventListener("msvisibilitychange", onVisibilityChanged, false);

        function OnRegisterSWError(e) { console.warn("SW register failed: ", e); }
        // Service worker intentionally disabled: assets are packaged in the APK
        // and served from file:///android_asset, no offline cache needed.
        window.C2_RegisterSW = function C2_RegisterSW() {};
    </script>
</body>
</html>
